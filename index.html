<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>AeroStream Hub</title> <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet"> <style> body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #ff8c00, #ffa94d); color: white; margin: 0; overflow-x: hidden; } /* HEADER IMAGE */ .header-img { width: 100%; max-height: 200px; object-fit: cover; } /* CENTER TOP */ .top-center { text-align: center; padding: 10px 0; } header { font-size: 32px; font-weight: 600; text-shadow: 0 0 12px rgba(255,255,255,0.7); } /* SEARCH */ .search-box { margin: 15px 0; } input { padding: 12px; width: 300px; border-radius: 25px; border: none; font-size: 16px; } /* SECTION */ .section { padding: 10px 20px; } .category { text-decoration: underline; font-size: 26px; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,255,255,0.5); } /* GRID */ .grid { display: flex; flex-wrap: wrap; gap: 14px; } /* CARD */ .card { width: 150px; /* back to narrower */ } .card a { text-decoration: none; color: white; } /* TALL POSTER */ .card img { width: 150px; height: 220px; /* taller like real posters */ object-fit: cover; border-radius: 16px; background: #999; box-shadow: 0 0 10px rgba(255,255,255,0.25); transition: 0.2s; } .card img:hover { transform: scale(1.05); } /* TITLE */ .card p { margin-top: 6px; font-size: 14px; font-weight: 600; } /* BUBBLES */ .bubble { position: fixed; bottom: -100px; border-radius: 50%; background: rgba(255,255,255,0.2); animation: floatUp linear infinite; } @keyframes floatUp { from { transform: translateY(0); } to { transform: translateY(-120vh); } } </style> </head> <body> <img class="header-img" src="https://lh7-rt.googleusercontent.com/sitesz/AClOY7punKoFKIgzNGml2-_UYyVPItNbmj_5SygXQ8vNgUQ-iCbwayxGG4yEvGOkc9pPOp5bJOd1cAN5PPXNVCZzL1bD_UaNRxDuGcyToMkgIPqMow5QnPEioba4VF-q01I3FA72sDsTkebNFtuxODkl lder Show 2</p> </a> </div> </div> </div> <script> function updateCount() { let items = document.querySelectorAll(".card"); document.getElementById("count").textContent = items.length; } function searchContent() { let input = document.getElementById("search").value.toLowerCase(); let items = document.querySelectorAll(".card"); items.forEach(item => { let text = item.textContent.toLowerCase(); item.style.display = text.includes(input) ? "" : "none"; }); } function createBubble() { let bubble = document.createElement("div"); bubble.classList.add("bubble"); let size = Math.random() * 40 + 10; bubble.style.width = size + "px"; bubble.style.height = size + "px"; bubble.style.left = Math.random() * 100 + "vw"; bubble.style.animationDuration = (Math.random() * 5 + 5) + "s"; document.body.appendChild(bubble); setTimeout(() => bubble.remove(), 10000); } setInterval(createBubble, 400); updateCount(); </script> </body> </html>
